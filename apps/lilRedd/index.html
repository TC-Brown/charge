<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lil Redd | Mobile Mechanic</title>
    <style>
        :root {
            --primary-orange: #e65100; /* Inspired by the car in the photo */
            --bg-dark: #121212;
            --card-gray: #1e1e1e;
            --text-light: #f5f5f5;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            font-weight: 400;
            font-size: 28px;
            background-image: url(car-bg.jpg);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background-color: #1e1e1e55;
        }
        /* Shield Design */
        .logo-shield {
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 10% 10% 50% 50%; /* Mimics the shield shape */
            corner-shape: scoop scoop round round;
            font-size: 2.5rem;
            font-family: serif;
            margin-bottom: 20px;
            background-color: #e65100;
            transform: scale(3);
        }
        #tools { 
            transform: translateY(5px);
        }
        /* */
        h1 {
            font-size: 3rem;
            margin: 0;
            font-family: 'Georgia', serif;
            font-style: italic;
        }

        .tagline {
            font-size: 1.5rem;
            color: var(--primary-orange);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            position: absolute;
            top: 25px;
            right: 650px;
            transform: scale(1.5);
        }

        /* Contact Button */
        .phone {
            color: white;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 150px;
            background-color: #e65100aa;
            border-radius: 25px;
            border: 2px solid white;
            display: flex;
        }
        /* Info Section */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 50px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: var(--card-gray);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 4px solid var(--primary-orange);
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
        /* other */ 
        #name { 
            position: absolute;
            top: 160px;
            left: 105px;
            color: var(--bg-dark);
            transform: scale(1.5);
        }
        #mech { 
            position: absolute;
            top: 10px;
            left: 100px;
        }
    </style>
</head>
<body>

    <section class="hero">
            <div class="logo-shield">
                <div id="tools">
                    <svg xmlns="http://www.w3.org/2000/svg" width="75px" height="75px" fill="currentColor" class="bi bi-tools" viewBox="0 0 16 16">
                        <path d="M1 0 0 1l2.2 3.081a1 1 0 0 0 .815.419h.07a1 1 0 0 1 .708.293l2.675 2.675-2.617 2.654A3.003 3.003 0 0 0 0 13a3 3 0 1 0 5.878-.851l2.654-2.617.968.968-.305.914a1 1 0 0 0 .242 1.023l3.27 3.27a.997.997 0 0 0 1.414 0l1.586-1.586a.997.997 0 0 0 0-1.414l-3.27-3.27a1 1 0 0 0-1.023-.242L10.5 9.5l-.96-.96 2.68-2.643A3.005 3.005 0 0 0 16 3q0-.405-.102-.777l-2.14 2.141L12 4l-.364-1.757L13.777.102a3 3 0 0 0-3.675 3.68L7.462 6.46 4.793 3.793a1 1 0 0 1-.293-.707v-.071a1 1 0 0 0-.419-.814zm9.646 10.646a.5.5 0 0 1 .708 0l2.914 2.915a.5.5 0 0 1-.707.707l-2.915-2.914a.5.5 0 0 1 0-.708M3 11l.471.242.529.026.287.445.445.287.026.529L5 13l-.242.471-.026.529-.445.287-.287.445-.529.026L3 15l-.471-.242L2 14.732l-.287-.445L1.268 14l-.026-.529L1 13l.242-.471.026-.529.445-.287.287-.445.529-.026z"/>
                    </svg>
                </div>
            </div>
    </section>

    <footer>
        <p>&copy; 2026 Lil Redd Mobile Mechanic</p>
    </footer>

</body>
</html>
