<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lil Redd | Mobile Mechanic</title>
    <style>
        :root {
            --primary-orange: #e65100; /* Inspired by the car in the photo */
            --bg-dark: #121212;
            --card-gray: #1e1e1e;
            --text-light: #f5f5f5;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('your-car-image.jpg') center/cover no-repeat;
        }
        /* Shield Design */
        .logo-shield {
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 10% 10% 50% 50%; /* Mimics the shield shape */
            font-size: 2.5rem;
            font-family: serif;
            margin-bottom: 20px;
        }
        .shield-content {
            transform: translateY(-40px) translateX(35px) scale(1.5);
            color: var(--primary-orange);
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            font-family: 'Georgia', serif;
            font-style: italic;
        }

        .tagline {
            font-size: 1.5rem;
            color: var(--primary-orange);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Contact Button */
        .cta-button {
            background-color: var(--primary-orange);
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .cta-button:hover {
            transform: scale(1.05);
        }

        /* Info Section */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 50px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: var(--card-gray);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 4px solid var(--primary-orange);
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="logo-shield">
            <div class="shield-content">R</div>
        </div>
        <h1>Lil Redd</h1>
        <p class="tagline">I will come to you</p>
        <a href="tel:5739793820" class="cta-button">Call 573-979-3820</a>
    </section>

    <section class="info-grid">
        <div class="card">
            <h3>Professional Mechanic</h3>
            <p>On-site repairs and maintenance to keep you on the road without the tow truck bill.</p>
        </div>
        <div class="card">
            <h3>Mobile Service</h3>
            <p>Work, home, or roadside—wherever your car is, that's where the shop is.</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Lil Redd Mobile Mechanic</p>
    </footer>

</body>
</html>
